###############################################################################
# CI/CD-Vorlage für microRealEstate – build → scan → sign → push → deploy
#
# Ablage im QUELLCODE-Repo (eurem Fork): .github/workflows/deploy.yml
# Auslöser: Git-Tag  vX.Y.Z  (immutables Semver-Tag = der Pin)
#
# Benötigte Repo-Secrets (Settings → Secrets and variables → Actions):
#   TS_OAUTH_CLIENT_ID      – Tailscale OAuth-Client-ID (Scope: devices, Tag: tag:ci)
#   TS_OAUTH_SECRET         – zugehöriges Secret
#   DEPLOY_SSH_KEY          – Private Key, dessen Public-Key beim deploy-User liegt
# GITHUB_TOKEN (automatisch) pusht in euren privaten GHCR-Namespace.
#
# ANPASSEN: die Matrix-Liste 'service' + context/dockerfile an euer Monorepo-Layout.
###############################################################################
name: build-and-deploy
on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io/${{ github.repository }}   # -> ghcr.io/<owner>/<repo>
  SERVER_HOST: thinkcentre                     # Tailscale-MagicDNS-Name
  DEPLOY_USER: jp                               # CI-Key ist per forced-command auf deploy.sh beschränkt

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # Push in GHCR
      id-token: write         # cosign keyless (OIDC)
    strategy:
      matrix:
        # name = Image-/Compose-Servicename ; dockerfile = Pfad im Monorepo
        include:
          - { name: gateway,           dockerfile: services/gateway/Dockerfile }
          - { name: authenticator,     dockerfile: services/authenticator/Dockerfile }
          - { name: api,               dockerfile: services/api/Dockerfile }
          - { name: tenantapi,         dockerfile: services/tenantapi/Dockerfile }
          - { name: pdfgenerator,      dockerfile: services/pdfgenerator/Dockerfile }
          - { name: emailer,           dockerfile: services/emailer/Dockerfile }
          - { name: landlord-frontend, dockerfile: webapps/landlord/Dockerfile }
          - { name: tenant-frontend,   dockerfile: webapps/tenant/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (amd64 – Zielserver ist x86_64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .                       # Monorepo: Root als Context (Dockerfiles COPYen aus services/ + webapps/)
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.name }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ matrix.name }}:latest

      - name: Trivy-Scan (Abbruch bei HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ matrix.name }}:${{ github.ref_name }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: cosign install
        uses: sigstore/cosign-installer@v3

      - name: Sign (keyless / OIDC)
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ matrix.name }}@${{ steps.build.outputs.digest }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Tailscale (ephemerer Node, tag:ci)
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: SSH-Key vorbereiten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy auslösen (forced command am Server ruft deploy.sh)
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${SERVER_HOST}" "${{ github.ref_name }}"
